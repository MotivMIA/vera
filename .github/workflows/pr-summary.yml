# Posts an automated PR summary comment (no API keys required).
# Optional: set OPENAI_API_KEY repo secret for a future AI-enhanced step.

name: PR summary

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  summary:
    name: PR summary comment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post or update summary comment
        uses: actions/github-script@v7
        env:
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
        with:
          script: |
            const marker = '<!-- pr-summary-bot -->';
            const pr = context.payload.pull_request;
            const base = pr.base.sha;
            const head = pr.head.sha;
            const branch = pr.head.ref;

            const { execSync } = require('child_process');
            const run = (cmd) => execSync(cmd, { encoding: 'utf8' }).trim();

            const files = run(`git diff --name-only ${base} ${head}`).split('\n').filter(Boolean);
            const stat = run(`git diff --stat ${base} ${head} | tail -1`) || 'n/a';
            const agentMatch = branch.match(/^agent-([^-]+)-/);
            const agent = agentMatch ? agentMatch[1] : 'unknown';

            const riskPatterns = [
              'middleware.ts',
              'lib/env.ts',
              'lib/didit.ts',
              'lib/security.ts',
              'app/api/',
              '.github/workflows/',
              'package.json',
              'package-lock.json',
            ];
            const riskFiles = files.filter((f) =>
              riskPatterns.some((p) => f.includes(p))
            );
            const riskSection =
              riskFiles.length > 0
                ? riskFiles.map((f) => `- \`${f}\``).join('\n')
                : '_No high-signal paths detected (still review the full diff)._';

            const fileList =
              files.length > 40
                ? files.slice(0, 40).join('\n') + '\n… (truncated)'
                : files.join('\n') || 'none';

            const aiNote = process.env.HAS_OPENAI === 'true'
              ? '_OPENAI_API_KEY is set — extend this workflow for AI narrative summaries._'
              : '_No OPENAI_API_KEY — path-based summary only. See docs/AI_AGENT_WORKFLOW.md._';

            const body = [
              '## Automated PR summary',
              '',
              `**Agent (from branch):** \`${agent}\``,
              `**Branch:** \`${branch}\``,
              `**Files changed:** ${files.length}`,
              `**Diff stat:** ${stat}`,
              '',
              '### Changed files',
              '```',
              fileList,
              '```',
              '',
              '### Risk areas (path-based)',
              riskSection,
              '',
              '### Required before merge',
              '- [ ] **CI checks** — lint, typecheck, build, audit',
              '- [ ] **Agent branch naming**',
              '- [ ] **Vercel** preview (if UI)',
              '- [ ] No secrets in diff',
              '- [ ] Supervisor reviewed (Codex worker PRs)',
              '',
              '### Suggested reviewer checklist',
              '1. Read risk paths first.',
              '2. Confirm scope matches the task.',
              '3. Trust CI; spot-check auth/API if touched.',
              '4. Confirm rollback notes in the PR body.',
              '',
              aiNote,
              '',
              '---',
              `_Generated by pr-summary.yml. ${marker}_`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = pr.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
