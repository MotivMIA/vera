# Runs on pull requests targeting main and on pushes to agent/feature branches.
# Merge to main is blocked until "CI checks" passes (configure branch protection).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "agent-**"
      - "codex"
      - "cursor"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Placeholders so Next.js build can compile without real secrets in CI.
      NEXT_PUBLIC_SITE_URL: https://visual-era.vercel.app
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-service-role-key-32chars-min
      DIDIT_API_KEY: ci-didit-api-key
      DIDIT_WORKFLOW_ID: ci-didit-workflow-id
      DIDIT_WEBHOOK_SECRET: ci-didit-webhook-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
