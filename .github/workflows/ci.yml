# Required status check for branch protection: "CI checks"
# Runs on pull_request only (not every agent push) for faster iteration.
# Fast paths: docs-only (~15s), config/scripts-only (lint+typecheck, no build).

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      NEXT_PUBLIC_SITE_URL: https://visual-era.com
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-service-role-key-32chars-min
      DIDIT_API_KEY: ci-didit-api-key
      DIDIT_WORKFLOW_ID: ci-didit-workflow-id
      DIDIT_WEBHOOK_SECRET: ci-didit-webhook-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect change scope
        id: filter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get list of changed files in the PR
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path')
          
          echo "Changed files:"
          echo "$FILES"
          echo ""
          
          # Check if only docs/markdown changed
          DOCS_ONLY=true
          while IFS= read -r file; do
            if ! [[ "$file" =~ \.(md|MD)$ ]] && ! [[ "$file" =~ ^docs/ ]] && ! [[ "$file" == "AGENTS.md" ]]; then
              DOCS_ONLY=false
              break
            fi
          done <<< "$FILES"
          echo "docs_only=$DOCS_ONLY" >> $GITHUB_OUTPUT
          
          # Check if any code changed
          CODE_CHANGED=false
          while IFS= read -r file; do
            if [[ "$file" =~ ^(app|components|lib)/ ]] || \
               [[ "$file" =~ middleware\.ts ]] || \
               [[ "$file" == "package.json" ]] || \
               [[ "$file" =~ package-lock\.json ]] || \
               [[ "$file" =~ next\.config ]] || \
               [[ "$file" == "tsconfig.json" ]] || \
               [[ "$file" =~ postcss\.config ]] || \
               [[ "$file" =~ tailwind\.config ]] || \
               [[ "$file" =~ ^public/ ]]; then
              CODE_CHANGED=true
              break
            fi
          done <<< "$FILES"
          echo "code=$CODE_CHANGED" >> $GITHUB_OUTPUT

      - name: Docs-only (skip build)
        if: steps.filter.outputs.docs_only == 'true'
        run: |
          echo "::notice::Docs/markdown only — skipping install, lint, and build."
          echo "Required check satisfied for documentation updates."

      - name: Setup Node.js
        if: steps.filter.outputs.docs_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: steps.filter.outputs.docs_only != 'true'
        run: npm ci

      - name: Repo boundary check
        if: steps.filter.outputs.docs_only != 'true'
        run: chmod +x ./scripts/check-repo-boundaries.sh && ./scripts/check-repo-boundaries.sh

      - name: Lint and typecheck
        if: steps.filter.outputs.docs_only != 'true'
        run: |
          npm run lint &
          pid_lint=$!
          npm run typecheck &
          pid_type=$!
          wait "$pid_lint"
          wait "$pid_type"

      - name: Tests
        if: steps.filter.outputs.docs_only != 'true' && steps.filter.outputs.code == 'true'
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.test?0:1)"; then
            npm test
          else
            echo "::notice::No test script — skipping."
          fi

      - name: Production build
        if: steps.filter.outputs.docs_only != 'true' && steps.filter.outputs.code == 'true'
        run: npm run build

      - name: Config-only notice
        if: steps.filter.outputs.docs_only != 'true' && steps.filter.outputs.code != 'true'
        run: echo "::notice::Workflow/scripts only — skipped production build."

      - name: Security audit (advisory)
        if: steps.filter.outputs.docs_only != 'true' && steps.filter.outputs.code == 'true'
        run: npm audit --audit-level=high || echo "::warning::npm audit reported high+ issues."
        continue-on-error: true
