# Runs on pull requests targeting main and on pushes to agent/feature branches.
# Required check for branch protection: "CI checks"

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "agent-**"
      - "codex"
      - "cursor"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SITE_URL: https://visual-era.vercel.app
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-service-role-key-32chars-min
      DIDIT_API_KEY: ci-didit-api-key
      DIDIT_WORKFLOW_ID: ci-didit-workflow-id
      DIDIT_WEBHOOK_SECRET: ci-didit-webhook-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.test?0:1)"; then
            echo "Running npm test..."
            npm test
          else
            echo "::notice::No test script in package.json — skipping tests."
            echo "Add \"test\": \"vitest\" (or similar) when ready."
          fi

      - name: Production build
        run: npm run build

      - name: Security audit
        run: |
          echo "Running npm audit (high severity and above)..."
          if npm audit --audit-level=high; then
            echo "No high-severity vulnerabilities reported."
          else
            echo "::warning::npm audit reported high+ issues. Review lockfile and dependencies."
            exit 0
          fi
        continue-on-error: true
