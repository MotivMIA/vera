# Required status check for branch protection: "CI checks"
# Fast path for docs-only PRs; full lint/typecheck/build for code changes.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "agent-**"
      - "codex"
      - "cursor"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs_only:
              - "docs/**"
              - "**/*.md"
              - "AGENTS.md"
              - ".github/**/*.md"
            code:
              - "**"
              - "!docs/**"
              - "!**/*.md"
              - "!AGENTS.md"
              - "!.github/**/*.md"

  ci:
    name: CI checks
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs_only != 'true'

    env:
      NEXT_PUBLIC_SITE_URL: https://visual-era.vercel.app
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-service-role-key-32chars-min
      DIDIT_API_KEY: ci-didit-api-key
      DIDIT_WORKFLOW_ID: ci-didit-workflow-id
      DIDIT_WEBHOOK_SECRET: ci-didit-webhook-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: |
          npm run lint &
          pid_lint=$!
          npm run typecheck &
          pid_type=$!
          wait "$pid_lint"
          wait "$pid_type"

      - name: Tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.test?0:1)"; then
            echo "Running npm test..."
            npm test
          else
            echo "::notice::No test script in package.json — skipping tests."
          fi

      - name: Production build
        run: npm run build

      - name: Security audit (advisory)
        run: |
          echo "Running npm audit (high severity and above)..."
          npm audit --audit-level=high || echo "::warning::npm audit reported high+ issues — review when convenient."
        continue-on-error: true

  docs-only:
    name: CI checks
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: needs.changes.outputs.docs_only == 'true'

    steps:
      - name: Docs-only change
        run: |
          echo "::notice::Docs/markdown only — skipping lint, typecheck, and build."
          echo "Required check satisfied for documentation updates."
